# ─────────────────────────────────────────────────────────────────────────
# FFEE — Main CI Pipeline
#
# Triggers: every push to main, every pull request targeting main.
#
# Job graph:
#
#   server ──────────────────────┐
#   worker ───────────────────── ├──► integration (smoke test)
#   sdk (with unit tests) ───────┘
#   admin-ui (build check)       (runs in parallel, not a gate)
#   docker (image build check)   (runs in parallel, not a gate)
#
# WHY separate jobs instead of one mega-job?
#   - Parallelism: server/worker/sdk/ui all run at the same time (~2 min total vs ~6 min serial)
#   - Granular failure reporting: a CSS typo doesn't block Go tests
#   - Caching: each job caches its own dependencies independently
#   - Re-run individual jobs on transient failures (common in Docker pulls)
# ─────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch when a new push arrives.
# This saves CI minutes and prevents stale results from blocking merges.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.22'
  NODE_VERSION: '22'

jobs:

  # ── Job 1: Go API Server ────────────────────────────────────────────────
  server:
    name: Server — vet & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: server/go.mod

      # go mod tidy: resolve the full dependency graph and generate go.sum.
      # This is the same step we run inside Docker (the Dockerfile uses tidy
      # instead of copying go.sum to avoid pseudo-version staleness issues).
      - name: Resolve dependencies (go mod tidy)
        run: go mod tidy

      # go vet catches common mistakes: unreachable code, printf format mismatches,
      # mutex copies, etc. It's fast (no compilation, just static analysis).
      - name: Static analysis (go vet)
        run: go vet ./...

      # Compile the binary with CGO disabled (same flags as the Dockerfile).
      # This proves the code compiles on Linux even if you develop on Windows.
      - name: Compile (CGO_ENABLED=0 GOOS=linux)
        run: CGO_ENABLED=0 GOOS=linux go build -ldflags="-s -w" -o /dev/null ./main.go

  # ── Job 2: CDC Worker ───────────────────────────────────────────────────
  worker:
    name: Worker — vet & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: worker/go.mod

      - name: Resolve dependencies (go mod tidy)
        run: go mod tidy

      - name: Static analysis (go vet)
        run: go vet ./...

      - name: Compile (CGO_ENABLED=0 GOOS=linux)
        run: CGO_ENABLED=0 GOOS=linux go build -ldflags="-s -w" -o /dev/null ./main.go

  # ── Job 3: Go SDK (with unit tests) ────────────────────────────────────
  # The SDK is a pure stdlib module — the evaluator and rollout hash are
  # deterministic pure functions with no I/O. Perfect for unit tests.
  sdk:
    name: SDK — test, vet & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: sdk/go.mod

      - name: Resolve dependencies (go mod tidy)
        run: go mod tidy

      # -race: data race detector — finds concurrent map read/writes.
      # -count=1: disables test result caching (always re-runs tests).
      # -v: verbose output (every test name + PASS/FAIL shown in CI log).
      - name: Unit tests (-race -count=1)
        run: go test -v -race -count=1 ./...

      - name: Static analysis (go vet)
        run: go vet ./...

      # Run benchmarks to ensure the hot path doesn't regress.
      # -benchtime=1s -benchmem: one second per benchmark, show allocations.
      - name: Benchmarks (evaluator hot path)
        run: go test -bench=. -benchtime=1s -benchmem ./...

  # ── Job 4: React Admin UI ───────────────────────────────────────────────
  admin-ui:
    name: Admin UI — install & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: admin-ui/package-lock.json

      # npm ci is stricter than npm install:
      # - Fails if package-lock.json is out of sync with package.json
      # - Never modifies package-lock.json (reproducible builds)
      # - 2-3x faster than npm install (skips resolution, installs from lock)
      - name: Install (npm ci)
        run: npm ci

      # Build the production bundle. This catches:
      # - JSX syntax errors
      # - Missing imports
      # - TypeScript type errors (if we migrate)
      # - Vite config issues
      - name: Build production bundle (npm run build)
        run: npm run build

      # Report bundle sizes so we can catch accidental bloat in PRs.
      - name: Report bundle size
        run: |
          echo "### Admin UI bundle sizes" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          du -sh dist/ dist/assets/* 2>/dev/null | head -20 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ── Job 5: Docker image builds ──────────────────────────────────────────
  # Builds both Docker images (server + worker) without pushing.
  # This catches Dockerfile issues and dependency resolution failures
  # that only surface inside the container (different OS, no local cache).
  docker:
    name: Docker — build images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Docker Buildx: enables BuildKit for better caching and multi-platform support.
      - uses: docker/setup-buildx-action@v3

      # Build the server image. push: false means the image is built and
      # discarded — we're only verifying the build succeeds.
      - name: Build server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: false
          tags: ffee-server:ci-${{ github.sha }}
          # BuildKit layer cache: store in GitHub Actions cache.
          # Dramatically speeds up subsequent builds by reusing unchanged layers.
          cache-from: type=gha,scope=server
          cache-to:   type=gha,scope=server,mode=max

      - name: Build worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: false
          tags: ffee-worker:ci-${{ github.sha }}
          cache-from: type=gha,scope=worker
          cache-to:   type=gha,scope=worker,mode=max

  # ── Job 6: Integration smoke test ──────────────────────────────────────
  # Brings up the FULL Docker Compose stack and runs real API calls.
  # This is the closest thing to a production environment in CI.
  #
  # Depends on server, worker, sdk passing first — no point running
  # integration tests if the code doesn't even compile.
  integration:
    name: Integration — full stack smoke test
    runs-on: ubuntu-latest
    needs: [server, worker, sdk]

    steps:
      - uses: actions/checkout@v4

      # --wait: block until all services pass their healthchecks.
      # If any service fails to start, this command exits non-zero.
      - name: Start full stack (docker compose up --wait)
        run: docker compose up -d --wait --timeout 120
        timeout-minutes: 5

      - name: Health check — server
        run: |
          response=$(curl -sf http://localhost:8080/health)
          echo "$response"
          echo "$response" | grep -q '"status":"ok"'

      - name: Verify 3 seeded environments exist
        run: |
          response=$(curl -sf http://localhost:8080/api/v1/environments)
          echo "$response"
          echo "$response" | grep -q '"production"'
          echo "$response" | grep -q '"staging"'
          echo "$response" | grep -q '"development"'

      - name: Create a feature flag
        run: |
          curl -sf -X POST http://localhost:8080/api/v1/flags \
            -H 'Content-Type: application/json' \
            -d '{"key":"ci-smoke-flag","name":"CI Smoke Test","flag_type":"boolean"}' \
            | grep -q '"ci-smoke-flag"'

      - name: Enable flag in development at 100% rollout
        run: |
          curl -sf -X PATCH http://localhost:8080/api/v1/flags/ci-smoke-flag/config/development \
            -H 'Content-Type: application/json' \
            -d '{"enabled":true,"rollout_percentage":100}' \
            | grep -q '"enabled":true'

      - name: Verify Redis cache updated (via /state endpoint)
        run: |
          # Wait up to 10s for the Postgres LISTEN/NOTIFY to update Redis
          for i in $(seq 1 10); do
            response=$(curl -sf "http://localhost:8080/api/v1/flags/ci-smoke-flag/state/development" 2>/dev/null)
            if echo "$response" | grep -q '"enabled":true'; then
              echo "✓ Redis cache updated after ${i} second(s)"
              echo "$response"
              exit 0
            fi
            sleep 1
          done
          echo "✗ Redis cache was NOT updated within 10 seconds"
          exit 1

      - name: Add a targeting rule
        run: |
          # Get development environment ID
          ENV_ID=$(curl -sf http://localhost:8080/api/v1/environments | \
            python3 -c "import sys,json; envs=json.load(sys.stdin)['data']; print(next(e['id'] for e in envs if e['name']=='development'))")
          echo "Development env ID: $ENV_ID"

          curl -sf -X POST "http://localhost:8080/api/v1/flags/ci-smoke-flag/rules" \
            -H 'Content-Type: application/json' \
            -d "{\"environment_id\":\"$ENV_ID\",\"priority\":0,\"attribute\":\"plan\",\"operator\":\"eq\",\"value\":\"pro\",\"serve_value\":true}" \
            | grep -q '"priority"'

      - name: Verify audit log has entries
        run: |
          response=$(curl -sf http://localhost:8080/api/v1/flags/ci-smoke-flag/audit)
          echo "$response"
          echo "$response" | grep -q '"action"'

      - name: Verify SSE stream endpoint responds
        run: |
          # Connect to SSE for 3 seconds and check we get the "connected" event
          timeout 3 curl -sf -N \
            -H "Accept: text/event-stream" \
            http://localhost:8080/api/v1/stream/development \
            | head -5 || true

      - name: Verify Prometheus metrics have flag data
        run: |
          curl -sf http://localhost:9090/metrics | grep -q 'ffee_flag_changes_total'

      # Always print logs on failure so we can debug from GitHub Actions UI
      - name: Print container logs on failure
        if: failure()
        run: |
          echo "=== server logs ==="
          docker compose logs server --tail=50
          echo "=== worker logs ==="
          docker compose logs worker --tail=20
          echo "=== compose ps ==="
          docker compose ps

      - name: Teardown
        if: always()
        run: docker compose down -v --remove-orphans
