global:
  scrape_interval: 15s      # Scrape every 15 seconds
  evaluation_interval: 15s  # Evaluate rules every 15 seconds
  scrape_timeout: 10s

# Alert manager config (Phase 7 — add alerting rules here)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

scrape_configs:
  # ── Feature Flag API Server ────────────────────────────────────
  - job_name: "ffee-server"
    static_configs:
      - targets: ["server:9090"]
    metrics_path: /metrics
    scrape_interval: 10s

  # ── CDC Worker ─────────────────────────────────────────────────
  # (Phase 5 will add Prometheus metrics to the worker)
  # - job_name: "ffee-worker"
  #   static_configs:
  #     - targets: ["worker:9095"]

  # ── Prometheus self-monitoring ─────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

