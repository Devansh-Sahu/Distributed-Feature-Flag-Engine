
# ─────────────────────────────────────────────────────────────────
#  PHASE 3: Full stack — PostgreSQL + Redis + Kafka + Debezium + Worker
#  Start: docker compose up -d
# ─────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL 16 ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ffee-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: featureflags
      POSTGRES_USER: ffee
      POSTGRES_PASSWORD: ffee_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/db/migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql
    # WAL level must be logical for Debezium CDC
    command: >
      postgres
        -c wal_level=logical
        -c max_replication_slots=5
        -c max_wal_senders=5
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ffee -d featureflags"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis 7 ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ffee-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Zookeeper (required by Kafka) ──────────────────────────────
  # WHY Zookeeper? Kafka uses it for distributed coordination:
  # leader election, cluster metadata, consumer group offsets.
  # Kafka 3.x can run without Zookeeper (KRaft mode), but the
  # Debezium connector image we use targets Kafka 2.x/3.x + ZK.
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: ffee-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_LOG4J_ROOT_LOGLEVEL: WARN
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Apache Kafka ───────────────────────────────────────────────
  # WHY Kafka over a simple queue?
  # 1. Durability: messages are persisted on disk. If the worker crashes,
  #    it resumes from its last committed offset — zero data loss.
  # 2. Replay: you can re-process old events for debugging or migration.
  # 3. Fan-out: multiple consumers can read the same topic independently.
  #    Today: worker. Tomorrow: analytics, audit, alerting.
  # 4. Back-pressure: producers don't block on slow consumers.
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: ffee-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"    # exposed for local dev tooling (kafka-ui, kafkacat)
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Two listeners:
      # - PLAINTEXT: internal Docker network (used by Debezium, worker, kafka-ui)
      # - PLAINTEXT_HOST: accessible from your laptop (port 9092)
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168    # 7 days
      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Debezium (Kafka Connect + PostgreSQL connector) ─────────────
  # WHY Debezium over LISTEN/NOTIFY (Phase 2)?
  # LISTEN/NOTIFY is ephemeral: if the server is down when a flag changes,
  # the notification is LOST FOREVER. You'll have stale cache until the
  # next update triggers a re-materialize.
  #
  # Debezium reads PostgreSQL's Write-Ahead Log (WAL). Every committed
  # transaction is written to WAL BEFORE the client gets an ACK. Even
  # if Debezium restarts, it resumes from the replication slot position —
  # zero missed events, guaranteed at-least-once delivery.
  debezium:
    image: debezium/connect:2.6
    container_name: ffee-debezium
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8083:8083"    # Kafka Connect REST API
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: ffee-debezium-connect
      CONFIG_STORAGE_TOPIC: ffee_connect_configs
      OFFSET_STORAGE_TOPIC: ffee_connect_offsets
      STATUS_STORAGE_TOPIC: ffee_connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      LOG_LEVEL: WARN
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s

  # ── Connector registration (runs once, then exits) ─────────────
  # Registers the Debezium PostgreSQL connector via the REST API.
  # WHY a separate service? Debezium doesn't auto-read config files.
  # The Kafka Connect REST API is the only way to register connectors.
  # This init container waits for Debezium to be healthy, then POSTs
  # the connector configuration and exits (restart: no).
  connector-setup:
    image: curlimages/curl:8.6.0
    container_name: ffee-connector-setup
    restart: "no"
    depends_on:
      debezium:
        condition: service_healthy
    volumes:
      - ./debezium:/debezium:ro
    command: >
      sh -c "
        echo 'Registering Debezium PostgreSQL connector...' &&
        curl -sf -X POST http://ffee-debezium:8083/connectors \
          -H 'Content-Type: application/json' \
          -d @/debezium/connector-config.json &&
        echo 'Connector registered successfully'
      "

  # ── Flag API Server ────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ffee-server
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      DATABASE_URL: postgres://ffee:ffee_secret@postgres:5432/featureflags?sslmode=disable
      REDIS_ADDR: redis:6379
      SERVER_PORT: "8080"
      METRICS_PORT: "9090"
      LOG_LEVEL: info
      ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── CDC Worker (Kafka consumer → Redis materializer) ───────────
  # This is the Phase 3 core: a Go service that consumes Kafka topics
  # produced by Debezium and materializes flag state to Redis.
  # It REPLACES the LISTEN/NOTIFY path with a durable, buffered pipeline.
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: ffee-worker
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://ffee:ffee_secret@postgres:5432/featureflags?sslmode=disable
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: kafka:29092
      KAFKA_GROUP_ID: ffee-worker
      KAFKA_TOPIC_FLAG_CONFIGS: ffee.public.flag_configs
      KAFKA_TOPIC_TARGETING_RULES: ffee.public.targeting_rules
      LOG_LEVEL: info

  # ── Kafka UI ───────────────────────────────────────────────────
  # Visual dashboard: browse topics, see messages, consumer group lag.
  # URL: http://localhost:8090
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ffee-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: ffee-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # ── Prometheus ─────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: ffee-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--storage.tsdb.retention.time=7d"
    depends_on:
      - server

  # ── Grafana ────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: ffee-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/feature-flags.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus

  # ── Loadtest App (Go server using SDK) ───────────────────────────
  loadtest-app:
    profiles:
      - loadtest
    build:
      context: .
      dockerfile: ./loadtest/Dockerfile
    container_name: ffee-loadtest-app
    ports:
      - "8085:8085"
    depends_on:
      server:
        condition: service_started
    environment:
      FFEE_SERVER_URL: http://server:8080
      FFEE_ENVIRONMENT: production
      PORT: 8085

  # ── k6 Load Tester ───────────────────────────────────────────────
  k6:
    profiles:
      - loadtest
    image: grafana/k6:latest
    container_name: ffee-k6
    depends_on:
      loadtest-app:
        condition: service_started
    volumes:
      - ./loadtest:/loadtest
    environment:
      TARGET_URL: http://loadtest-app:8085/evaluate
    command: run /loadtest/k6-script.js

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  zookeeper_log:
  prometheus_data:
  grafana_data:
